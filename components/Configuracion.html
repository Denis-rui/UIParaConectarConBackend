<section class="configuracion">
  <h2>Configuración</h2>

  <form action="" method="post" class="form" id="formulario">
    <p>🏨 Datos del Hotel</p>
    <hr />

    <div class="form-grid">
      <div class="form-campo">
        <label for="nombre" class="form-label">NOMBRE DEL HOTEL</label>
        <input
          id="nombre"
          type="text"
          placeholder="Refugio del Utcubamba"
          name="nombre"
          class="form-input"
          autocomplete="off"
        />
        <small class="error" id="error-nombre"></small>
      </div>

      <div class="form-campo">
        <label for="ruc" class="form-label">RUC</label>
        <input
          id="ruc"
          type="text"
          placeholder="20761477909"
          name="ruc"
          class="form-input"
          required
        />
        <small class="error" id="error-ruc"></small>
      </div>

      <div class="form-campo">
        <label for="telefono" class="form-label">TELÉFONO</label>
        <input
          id="telefono"
          type="tel"
          placeholder="+51 993 696 425"
          name="telefono"
          class="form-input"
          required
        />
        <small class="error" id="error-telefono"></small>
      </div>

      <div class="form-campo">
        <label for="email" class="form-label">EMAIL DE CONTACTO</label>
        <input
          id="email"
          type="email"
          placeholder="refugiodelutcubamba@gmil.com"
          name="email"
          class="form-input"
          required
        />
        <small class="error" id="error-email"></small>
      </div>

      <div class="form-campo">
        <label for="direccion" class="form-label">DIRECCIÓN</label>
        <input
          id="direccion"
          type="text"
          placeholder="Av. Circunvalación 311, Bagua"
          name="direccion"
          class="form-input"
          required
        />
      </div>

      <div class="form-campo">
        <label for="ciudad-region" class="form-label">CIUDAD / REGIÓN</label>
        <input
          id="ciudad-region"
          type="text"
          placeholder="Bagua, Amazonas"
          name="ciudad-region"
          class="form-input"
          required
        />
      </div>

      <div class="form-campo full">
        <label for="descripcion-slogan" class="form-label"
          >DESCRIPCIÓN / SLOGAN</label
        >
        <input
          type="text"
          placeholder="Tu comodidad es nuestra prioridad"
          name="descripcion-slogan"
          id="descripcion-slogan"
          class="form-input"
        />
      </div>

      <div class="form-campo">
        <label for="monedas" class="form-label">MONEDA</label>
        <select id="monedas" name="monedas" class="form-select">
          <option value="sol">S/ - Sol Peruano (PEN)</option>
          <option value="dolar">$ - Dólar Americano (USD)</option>
          <option value="euro">€ - Euro (EUR)</option>
        </select>
      </div>

      <div class="form-campo">
        <label for="check-in" class="form-label">HORA DE CHECK-IN</label>
        <input
          id="check-in"
          type="time"
          name="check-in"
          class="form-input"
          required
        />
      </div>

      <div class="form-campo">
        <label for="check-out" class="form-label">HORA DE CHECK-OUT</label>
        <input
          type="time"
          name="check-out"
          id="check-out"
          class="form-input"
          required
        />
      </div>

      <div class="form-campo">
        <label for="web-redes" class="form-label">WEB / REDES</label>
        <input
          id="web-redes"
          type="text"
          placeholder="www.refugiodelutcubamba.com"
          name="web-redes"
          class="form-input"
          required
        />
      </div>
    </div>
    <button type="submit" class="form-button">Guardar Configuración</button>
  </form>
</section>
