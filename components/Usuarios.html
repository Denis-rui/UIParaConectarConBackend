<section class="usuarios">
  <header class="header-usuarios">
    <h2>Usuarios</h2>
    <button id="btnNuevoUsuario" type="button" class="boton-nuevo-usuario">
      Nuevo Usuario
    </button>
  </header>
  <div>
    <input
      class="buscar"
      id="inputBuscarUsuario"
      type="text"
      placeholder="🔍 Buscar usuario"
    />
  </div>

  <div class="tabla">
    <table class="tbl-usuarios">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Usuario</th>
          <th>Gmail</th>
          <th>Telefono</th>
          <th>DNI</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="contenido-usuarios"></tbody>
    </table>
  </div>
</section>
